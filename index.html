<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joao & Luquinhas - Reino Pixel</title>
  <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
  <main class="app">
    <section class="topbar" aria-label="Painel do jogo">
      <div>
        <span class="kicker">Aventura 8-bits</span>
        <h1>Joao & Luquinhas</h1>
      </div>

      <div class="controls" aria-label="Controles">
        <span><strong>Joao</strong> A/D/W</span>
        <span><strong>Luquinhas</strong> Setas</span>
        <span><strong>Celular</strong> botoes na tela</span>
      </div>
    </section>

    <section class="stage">
      <canvas id="game" width="960" height="540" aria-label="Jogo Joao e Luquinhas"></canvas>
      <div class="status">
        <strong id="mensagem">Fase 1</strong>
        <div class="actions">
          <button type="button" onclick="alternarSom()" id="botaoSom">Som: ligado</button>
          <button type="button" onclick="reiniciarJogo()">Reiniciar</button>
        </div>
      </div>
    </section>

    <section class="touch-controls" aria-label="Controles para celular">
      <div class="player-picker" aria-label="Escolher jogador">
        <button type="button" class="player-choice is-selected" data-player="joao">Joao</button>
        <button type="button" class="player-choice" data-player="luquinhas">Luquinhas</button>
      </div>

      <div class="touch-pad">
        <span id="activePlayerLabel">Controlando Joao</span>
        <div class="mobile-gamepad">
          <div class="direction-pad" aria-label="Direcional">
            <button type="button" class="touch-btn dir left" data-action="left" aria-label="Esquerda">◀</button>
            <div class="dpad-center" aria-hidden="true"></div>
            <button type="button" class="touch-btn dir right" data-action="right" aria-label="Direita">▶</button>
          </div>

          <button type="button" class="touch-btn jump action-jump" data-action="jump" aria-label="Pular">PULAR</button>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js?v=4"></script>
</body>
</html>
